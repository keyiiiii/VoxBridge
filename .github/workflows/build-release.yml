name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.7.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: macos-14          # Apple Silicon (arm64)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Framework Python の確認 (なければビルドスクリプトがエラーで止まる)
      - name: Verify framework Python
        run: |
          python3 -c "import sysconfig; fw=sysconfig.get_config_var('PYTHONFRAMEWORKPREFIX'); print(f'Framework: {fw}'); assert fw"

      # タグからバージョン取得 (v0.2.0 → 0.2.0)
      - name: Extract version
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      # .app ビルド
      - name: Build VoxBridge.app
        run: python3 scripts/build_app.py --version "${{ steps.version.outputs.version }}"

      # zip 圧縮 (-y でシンボリックリンク保持)
      - name: Create zip
        run: |
          cd dist
          zip -r -y "VoxBridge-${{ steps.version.outputs.version }}-arm64.zip" VoxBridge.app

      # SHA256 チェックサム生成
      - name: Generate checksum
        run: |
          cd dist
          shasum -a 256 "VoxBridge-${{ steps.version.outputs.version }}-arm64.zip" > "VoxBridge-${{ steps.version.outputs.version }}-arm64.zip.sha256"

      # GitHub Releases に公開
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/VoxBridge-*.zip
            dist/VoxBridge-*.sha256

      # Homebrew Tap を自動更新
      - name: Update Homebrew Tap
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set, skipping tap update"
            exit 0
          fi
          SHA256=$(cat dist/VoxBridge-${VERSION}-arm64.zip.sha256 | awk '{print $1}')
          echo "Updating homebrew-tap: version=${VERSION}, sha256=${SHA256}"

          # homebrew-tap リポジトリをクローン
          git clone "https://x-access-token:${GH_TOKEN}@github.com/keyiiiii/homebrew-tap.git" /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          # Cask ファイルの version と sha256 を更新
          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" Casks/voxbridge.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA256}\"/" Casks/voxbridge.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/voxbridge.rb
          git commit -m "Update VoxBridge to ${VERSION}"
          git push
